name: CI Heavy — Full environment and integration tests

# Run monthly by default, and allow manual dispatch
on:
  schedule:
    - cron: '0 2 1 * *'  # run monthly at 02:00 UTC on day 1
  workflow_dispatch: {}

jobs:
  heavy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniforge (conda)
        uses: conda-incubator/setup-miniconda@v2
        with:
          miniforge-version: 'latest'
          auto-update-conda: false
          python-version: 3.11
          auto-activate-base: false

      - name: Create env with mamba (heavy)
        shell: bash -l {0}
        run: |
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda config --set channel_priority strict
          conda config --add channels conda-forge
          # Create the full env (may take a long time)
          mamba env create -f environment.yml -n cxxgeom || conda env create -f environment.yml -n cxxgeom

      - name: Activate env and run heavy post-link
        shell: bash -l {0}
        env:
          RUN_HEAVY: '1'
        run: |
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate cxxgeom
          echo "Running heavy post-link (OpenVDB / VMTK builds)"
          bash .conda/post-link.sh

      - name: Configure, build and run integration tests
        shell: bash -l {0}
        run: |
          source "$(conda info --base)/etc/profile.d/conda.sh"
          conda activate cxxgeom
          rm -rf build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cd build
          ctest --output-on-failure --verbose
